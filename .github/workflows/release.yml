name: Release build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Release build
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout repository submodules
        run: git submodule update --init --recursive || true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install build tools
        run: |
          brew update
          brew install cmake make wget ldid

      - name: Fetch external sources
        shell: bash
        run: |
          set -euo pipefail

          fetch_repo() {
            local url="$1"
            local path="$2"
            local branch="${3:-}"
            if [ -f "$path/.git" ] || [ -d "$path/.git" ]; then
              return
            fi
            rm -rf "$path"
            if [ -n "$branch" ]; then
              git clone --depth 1 --branch "$branch" "$url" "$path"
            else
              git clone --depth 1 "$url" "$path"
            fi
          }

          fetch_repo https://github.com/AFNetworking/AFNetworking Natives/external/AFNetworking
          fetch_repo https://github.com/abbeycode/UnzipKit Natives/external/UnzipKit
          fetch_repo https://github.com/khanhduytran0/DBNumberedSlider Natives/external/DBNumberedSlider
          fetch_repo https://github.com/khanhduytran0/fishhook Natives/external/fishhook jev/main
          fetch_repo https://github.com/MobileGL-Dev/MobileGlues Natives/external/MobileGlues main
          git -C Natives/external/MobileGlues submodule update --init --recursive --depth 1

      - name: Get JRE8
        run: |
          mkdir -p depends
          curl -fL --retry 5 -o depends/jre8-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre8-ios-aarch64.zip
          unzip -o depends/jre8-ios-aarch64.zip -d depends
          rm depends/jre8-ios-aarch64.zip

      - name: Get JRE17
        run: |
          curl -fL --retry 5 -o depends/jre17-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre17-ios-aarch64.zip
          unzip -o depends/jre17-ios-aarch64.zip -d depends
          rm depends/jre17-ios-aarch64.zip

      - name: Get JRE21
        run: |
          curl -fL --retry 5 -o depends/jre21-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre21-ios-aarch64.zip
          unzip -o depends/jre21-ios-aarch64.zip -d depends
          rm depends/jre21-ios-aarch64.zip

      - name: Validate source separation
        shell: bash
        run: |
          set -euo pipefail

          if [ -e JavaApp/src/lwjgl/org/lwjgl/LWJGLException.java ]; then
            echo "LWJGL 3.3.1-only classes must stay outside JavaApp/src/lwjgl."
            exit 1
          fi
          test -f JavaApp/src_lwjgl331/org/lwjgl/LWJGLException.java

          if grep -R -I -n -E 'auto\.optimized|ZinkNext|libOSMesa-ZinkNext|resolveRendererNameForMinecraft|rendererUsesOSMesaForMinecraft|MESA_LOADER_DRIVER_OVERRIDE|resolveLWJGLOpenGLLibraryName|OPENGL_LIBRARY_NAME' Natives JavaApp; then
            echo "Renderer stack must stay unchanged in this branch."
            exit 1
          fi

      - name: Validate CurseForge API key
        shell: bash
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${CURSEFORGE_API_KEY:-}" ]; then
            echo "CURSEFORGE_API_KEY is required for CurseForge support. Add it as a repository secret or variable."
            exit 1
          fi

      - name: Build for ${{ matrix.platform_name }}
        shell: bash
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          export RUNNER=1

          if [ "${{ matrix.platform_name }}" = "ios" ]; then
            gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM=${{ matrix.platform }} BOOTJDK="$JAVA_HOME/bin" ALLOW_NON_JDK8=1 JAVA_RELEASE=8 JAVA_JOBS=1
            gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1 BOOTJDK="$JAVA_HOME/bin" ALLOW_NON_JDK8=1 JAVA_RELEASE=8 JAVA_JOBS=1
          elif [ "${{ matrix.platform_name }}" = "tvos" ]; then
            gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1 BOOTJDK="$JAVA_HOME/bin" ALLOW_NON_JDK8=1 JAVA_RELEASE=8 JAVA_JOBS=1
          else
            gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM=${{ matrix.platform }} BOOTJDK="$JAVA_HOME/bin" ALLOW_NON_JDK8=1 JAVA_RELEASE=8 JAVA_JOBS=1
          fi

      - name: Upload regular ipa
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-${{ matrix.platform_name }}.ipa
          path: artifacts/org.angelauramc.amethyst-*-${{ matrix.platform_name }}.ipa

      - name: Upload regular tipa
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-${{ matrix.platform_name }}-trollstore.tipa
          path: artifacts/org.angelauramc.amethyst-*-${{ matrix.platform_name }}-trollstore.tipa

      - name: Upload PojavLauncher.dSYM
        uses: actions/upload-artifact@v4
        if: matrix.platform_name == 'ios'
        with:
          name: AngelAuraAmethyst.dSYM
          path: artifacts/AngelAuraAmethyst.dSYM

      - name: Upload Java runtimes
        uses: actions/upload-artifact@v4
        with:
          name: java_runtimes
          path: artifacts/java_runtimes.zip
